name: Python-free alpha artifacts

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  native-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            suffix: ""
          - os: macos-latest
            goos: darwin
            goarch: amd64
            suffix: ""
          - os: windows-latest
            goos: windows
            goarch: amd64
            suffix: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - name: Build twice from identical inputs
        shell: bash
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          SOURCE_DATE_EPOCH: "1767225600"
        run: |
          mkdir -p dist
          go build -trimpath -buildvcs=false -mod=readonly -ldflags=-buildid= -o dist/first${{ matrix.suffix }} ./cmd/ytdlp-go
          go build -trimpath -buildvcs=false -mod=readonly -ldflags=-buildid= -o dist/ytdlp-go${{ matrix.suffix }} ./cmd/ytdlp-go
          cmp dist/first${{ matrix.suffix }} dist/ytdlp-go${{ matrix.suffix }}
      - name: Run native alpha binary
        shell: bash
        run: dist/ytdlp-go${{ matrix.suffix }} --version
      - uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/ytdlp-go${{ matrix.suffix }}
          if-no-files-found: error
          retention-days: 7

  assemble:
    needs: native-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: inputs
      - name: Build deterministic release set
        shell: bash
        run: |
          mkdir dist
          go run ./cmd/ytdlp-release \
            --version "0.1.0-alpha.${GITHUB_RUN_NUMBER}" \
            --commit "${GITHUB_SHA}" \
            --epoch "2026-01-01T00:00:00Z" \
            --output dist \
            --artifact linux/amd64:inputs/binary-linux-amd64/ytdlp-go \
            --artifact darwin/amd64:inputs/binary-darwin-amd64/ytdlp-go \
            --artifact windows/amd64:inputs/binary-windows-amd64/ytdlp-go.exe
          cd dist
          sha256sum --check SHA256SUMS
      - uses: actions/upload-artifact@v4
        with:
          name: ytdlp-go-python-free-alpha
          path: dist
          if-no-files-found: error
          retention-days: 7
