name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true
      - name: Scan complete history for secrets
        shell: bash
        run: |
          set -euo pipefail
          tools=$(mktemp -d)
          trap 'rm -rf "$tools"' EXIT
          curl --fail --location --proto '=https' --tlsv1.2 \
            --output "$tools/gitleaks.tar.gz" \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  $tools/gitleaks.tar.gz" | sha256sum --check --strict
          tar -xzf "$tools/gitleaks.tar.gz" -C "$tools" gitleaks
          "$tools/gitleaks" git --config .gitleaks.toml --redact --log-opts=--all
      - name: Check formatting
        run: test -z "$(gofmt -l .)"
      - name: Check module drift
        run: go mod tidy -diff
      - name: Vet
        run: go vet ./...
      - name: Validate compatibility claims
        run: go run ./cmd/paritycheck
      - name: Test
        run: go test ./...
