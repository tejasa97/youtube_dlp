name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: test -z "$(gofmt -l .)"
      - run: go mod tidy
      - run: git diff --exit-code -- go.mod go.sum
      - run: go vet ./...
      - run: go run ./cmd/paritycheck

  fuzz:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ./internal/value
            target: FuzzValueJSON
          - package: ./internal/compat/template
            target: FuzzResolve
          - package: ./internal/compat/matchfilter
            target: FuzzParse
          - package: ./internal/compat/metadata
            target: FuzzActions
          - package: ./internal/compat/progress
            target: FuzzRender
          - package: ./internal/format
            target: FuzzParseSelector
          - package: ./internal/downloader
            target: FuzzContentRange
          - package: ./internal/fragment
            target: FuzzPlanHash
          - package: ./internal/protocol/hls
            target: FuzzParse
          - package: ./internal/protocol/dash
            target: FuzzParse
          - package: ./internal/protocol/ism
            target: FuzzParse
          - package: ./internal/media/ffmpeg
            target: FuzzRedactDiagnostic
          - package: ./internal/media/ffmpeg
            target: FuzzOperationInputValidation
          - package: ./internal/media/postprocess
            target: FuzzArtifactPaths
          - package: ./pkg/ytdlp
            target: FuzzConfinedPostprocessPath
          - package: ./internal/plugin/rpc
            target: FuzzReadFrame
          - package: ./internal/plugin/wasm
            target: FuzzDecodeResponse
          - package: ./internal/cookies/chromium
            target: FuzzMacDecryptor
          - package: ./internal/cookies/netscape
            target: FuzzParse
          - package: ./internal/cookies/firefox
            target: FuzzValidCookie
          - package: ./internal/cookies/chromiumlinux
            target: FuzzDecrypt
          - package: ./internal/compat/config
            target: FuzzTokenize
          - package: ./internal/compat/config
            target: FuzzDecode
          - package: ./internal/compat/config
            target: FuzzExpandAliases
          - package: ./internal/archive
            target: FuzzParseIdentity
          - package: ./internal/cache
            target: FuzzCacheKeyEncoding
          - package: ./internal/cache
            target: FuzzCacheHeader
          - package: ./internal/extractor
            target: FuzzParseYouTubePlaylistData
          - package: ./internal/extractor
            target: FuzzOnDemandEntries
          - package: ./internal/extractor
            target: FuzzTwitchMetadataResponse
          - package: ./internal/extractor
            target: FuzzSoundCloudURLClassification
          - package: ./internal/extractor
            target: FuzzSoundCloudPageEntries
          - package: ./internal/extractor
            target: FuzzParseVimeoConfig
          - package: ./internal/extractor
            target: FuzzParseTikTokPage
          - package: ./internal/extractor
            target: FuzzSyntheticAuthResponse
          - package: ./internal/extractor
            target: FuzzRegionSVTVideoResponse
          - package: ./internal/upstreamdelta
            target: FuzzParseLog
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -run=^$ -fuzz='^${{ matrix.target }}$' -fuzztime=2s ${{ matrix.package }}

  cross-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go build ./...
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: amd64

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...

  race:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go test -race ./...

  media:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: sudo apt-get update && sudo apt-get install --yes ffmpeg
      - run: go test -v ./internal/media/ffmpeg ./internal/media/postprocess ./internal/protocol/hls ./internal/protocol/dash ./internal/protocol/ism ./pkg/ytdlp

  python-free:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build --file .github/python-free.Dockerfile --tag ytdlp-go-python-free .
      - run: docker run --rm ytdlp-go-python-free --version
      - run: docker run --rm --entrypoint /jscheck ytdlp-go-python-free -helper /ytdlp-js-helper
