version: 1
reference:
  repository: https://github.com/yt-dlp/yt-dlp
  commit: aefce1eea4d0b6bab1ec2bd3beff09bff91a39c8
  captured: 2026-07-17
  provenance: PROVENANCE.md
format_cases:
  - name: fallback and merge
    expression: bestvideo[ext=mp4][height>=720]/bestvideo[height<=720]+bestaudio[tbr>100]
    selected: ["720", audio-high]
  - name: video prefix filter
    expression: bestvideo[vcodec^=av]
    selected: ["360"]
  - name: audio suffix filter
    expression: bestaudio[format_id$=high]
    selected: [audio-high]
  - name: regex filter
    expression: best[ext~=webm|mp4]
    selected: ["720"]
  - name: worst video
    expression: worstvideo
    selected: ["360"]
template_cases:
  - name: traversal alternatives defaults and replacement
    pattern: '%(missing,uploader|anonymous)s %(missing|anonymous)s %(uploader&by {}|unknown)s %(chapters.-1.title)s'
    rendered: alice anonymous by alice last
  - name: numeric and date formatting
    pattern: '%(view_count)08d %(rating).1f %(upload_date>%Y-%m-%d)s'
    rendered: 00000042 4.2 2026-07-17
  - name: escaped percent and scalar fields
    pattern: '%% %(title)s.%(ext)s'
    rendered: '% Synthetic video.mp4'
