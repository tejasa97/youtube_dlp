      - internal/extractor.TestGenericTwitterStreamPrecedesOpenGraphAndHandlesTypeBeforeURL
      - internal/extractor.TestGenericMalformedJSONLDFallsBackAndAudioObjectIsAudioOnly
      - internal/extractor.TestGenericMetadataMediaRejectsUnsafeAndNonMediaURLs
      - internal/extractor.TestGenericMetadataMediaBoundsAndCancellation
      - internal/extractor.FuzzDiscoverGenericEmbedEntries
      - internal/extractor.FuzzDiscoverGenericMetadataMedia
      - pkg/ytdlp.TestClientDownloadsGenericOpenGraphMediaWithPageReferer
