    known_deviation: Compatibility is scoped to the pinned video, playlist-continuation, exact public UCID, pinned Unicode-aware `@handle`, and bounded Unicode legacy `/user` and `/c` alias explicit `/videos`, `/shorts`, `/streams`, `/playlists`, `/home`, `/featured`, `/community`, `/releases`, and `/podcasts` tabs, plus bare channel/handle/alias roots that lazily aggregate advertised videos, streams, and Shorts or try the synthesized `UU<channel-suffix>` uploads playlist, bounded public `ytsearch` and results-URL video search, bounded playable YouTube Music default/song/video search, bounded opt-in public and authenticated-WEB comments, live-HLS, finite post-live DVR reconstruction, opt-in active live-from-start reconstruction, structured player-config discovery, native-client recovery, authenticated exact-origin WEB player format recovery, manual/automatic/translated caption renderer, bounded subtitle listing with explicit simulation control, sidecar selection/download/conversion/embedding, and explicit native-Go PO-token provider corpus. Mixed home feeds accept video and playlist renderers; community feeds emit attached and inline media URL results with per-post duplicate suppression and cross-post occurrence retention; releases and podcasts emit playlist results. Bare roots exclude home shelves, preserve upload occurrence order, support no-videos and empty channels, and enforce one aggregate entry bound. Comment retrieval supports top/new ordering, visitor rotation, legacy and modern fields, inline replies, click-tracked reply continuations, nested subthreads, pinned duplicate handling, bounded transient/incomplete retries, actual retrieved counts, and explicit total/parent/reply/per-thread/depth limits. Signed-in WEB comments keep root, sort, reply, and retry continuations inside the exact-origin no-redirect cookie boundary. It does not claim other authenticated comment clients, approximate count before retrieval, estimated timestamps, upstream's configurable ignore-error policy, or untested renderer families. Anonymous visitor identity is propagated across bounded, cookie-isolated Android and Android VR requests, enabling URL-bearing adaptive video/audio recovery. Logged-in watch pages with valid SID cookies use redirect-disabled WEB player and comment requests; credentials never cross into anonymous clients. Player, GVS, and subtitle token placement is supported through an embedding-provided Go provider; no built-in generator, implicit endpoint, executable, Python bridge, persistent cache, or upstream external-provider protocol is claimed. Existing sidecars fail closed unless overwrite is enabled. Search is capped at 50 results; general search does not claim channel/playlist/hashtag results or arbitrary filter parity, while Music search excludes albums, artists, playlists, podcasts, arbitrary filters, and authenticated/premium success. Membership/custom tabs, Python-regex-only language rules, direct SABR transport, broader authenticated Innertube clients, external live-generator delegation, restart resume, and broader player/renderer variants remain pending.

