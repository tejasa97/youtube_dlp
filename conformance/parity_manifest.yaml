    known_deviation: Playlist ranges and bounded item expressions are one-based, preserve original source indexes, support sparse and negative indexes plus positive/negative steps, suppress duplicate selections, stop finite pagination at the last requested index, and can reverse the selected result. Expressions that require the final length consume the bounded sequence, and the sequential extractor boundary may fetch earlier pages that an upstream random-access paged list can skip. Entries resolve sequentially with a fail-fast error policy and id/title overlays for transparent URL results. Flat playlist mode retains selected URL-result metadata without child extraction or download; upstream's non-CLI global/discard extract_flat modes are not exposed. Random ordering, arbitrary transparent fields, and configurable ignore-error policy remain broader compatibility work.

