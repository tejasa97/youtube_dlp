version: 1
capabilities:
  - id: foundation.cli
    name: Foundation CLI boundary
    phase: 0
    compatibility_target: Run the Phase 0 fixture/direct-HTTP workflow with stable help, output separation, and categorized exits.
    status: compatible
    evidence:
      - internal/cli.TestRunVersion
      - internal/cli.TestRunRequiresURL
      - internal/cli.TestRunWalkingSkeletonAndJSONSeparation
      - internal/cli.TestRunResumesPartialDownload
      - internal/cli.TestRunCancellationExitCode
      - internal/e2e.TestCLIProcessWalkingSkeleton
    owner: core

  - id: foundation.embedding_api
    name: Cancellable Go embedding boundary
    phase: 0
    compatibility_target: Expose a context-aware operation interface with categorized errors.
    status: compatible
    evidence:
      - pkg/ytdlp.TestIsCategory
      - pkg/ytdlp.TestClientWalkingSkeleton
      - pkg/ytdlp.TestClientConcurrentOperationsDoNotShareState
      - pkg/ytdlp.TestClientCancellationReachesTransport
    owner: core

  - id: api.alpha_contract
    name: Initial public Go alpha contract
    phase: 2
    compatibility_target: Publish a versioned cancellable Go embedding contract with stable categorized errors and structured event serialization.
    status: compatible
    evidence:
      - pkg/ytdlp.TestAlphaAPIContractCompilesAndCategorizesCancellation
      - pkg/ytdlp.TestAlphaEventJSONContract
      - pkg/ytdlp.TestPublicEventKindsMatchOperationEvents
      - docs/P2_API_COMPATIBILITY_POLICY.md
      - docs/P2_FALLBACK_INVENTORY.md
    owner: core
    depends_on:
      - foundation.embedding_api

  - id: foundation.capability_manifest
    name: Capability evidence manifest
    phase: 0
    compatibility_target: Reject invalid claims, duplicate IDs, and unknown capability dependencies.
    status: compatible
    evidence:
      - internal/conformance.TestRepositoryManifest
      - internal/conformance.TestValidateRequiresEvidenceForCompatibleClaim
      - internal/conformance.TestValidateRejectsUnknownDependency
    owner: conformance

  - id: metadata.ordered_values
    name: Ordered dynamic metadata values
    phase: 0
    compatibility_target: Preserve field order, heterogeneous values, and missing-versus-null semantics.
    status: compatible
    evidence:
      - internal/value.TestMissingAndNullAreDistinct
      - internal/value.TestObjectOrderAndUpdate
      - internal/value.TestMergeRulesAndClone
    owner: core

  - id: metadata.deterministic_json
    name: Deterministic metadata JSON
    phase: 0
    compatibility_target: Encode ordered metadata deterministically with documented numeric behavior.
    status: compatible
    evidence:
      - internal/value.TestDeterministicJSONAndMissingOmission
      - internal/value.TestJSONRoundTripPreservesOrderAndKinds
      - internal/value.FuzzValueJSON
    owner: core
    depends_on:
      - metadata.ordered_values

  - id: test.fixture_server
    name: Offline deterministic fixture server
    phase: 0
    compatibility_target: Provide deterministic page, media, redirect, cookie, compression, and failure endpoints.
    status: compatible
    evidence:
      - internal/testserver.TestPageDescribesDirectMedia
      - internal/testserver.TestMediaFullAndRangeResponses
      - internal/testserver.TestRedirectGzipAndCookies
      - internal/testserver.TestSlowEndpointHonorsCancellation
      - internal/testserver.TestDisconnectEndpointTruncatesResponse
      - internal/testserver.TestMutableEndpointAdvancesDeterministically
    owner: io

  - id: network.shared_transport
    name: Shared HTTP transport
    phase: 0
    compatibility_target: Provide cancellable HTTP behavior shared by extractors and downloaders.
    status: compatible
    evidence:
      - internal/network.TestClientHeadersCookiesRedirectsAndCompression
      - internal/network.TestReadPageLimitAndCancellation
      - internal/network.TestClientUsesConfiguredProxy
      - internal/network.TestDoLeavesBodyOwnershipToCaller
      - internal/network.TestRedaction
    owner: io
    depends_on:
      - test.fixture_server

  - id: extractor.direct_media
    name: Direct-media extraction
    phase: 0
    compatibility_target: Normalize a direct media URL into the common metadata and format model.
    status: compatible
    evidence:
      - internal/extractor.TestRegistrySelectionIsDeterministic
      - internal/extractor.TestFixtureExtraction
      - internal/extractor.TestGenericDirectMediaExtraction
      - internal/extractor.TestFixtureRejectsMalformedMetadata
    owner: core
    depends_on:
      - metadata.ordered_values
      - network.shared_transport

  - id: downloader.direct_http
    name: Resumable direct HTTP download
    phase: 0
    compatibility_target: Download direct media with progress, cancellation, safe finalization, and validated resume.
    status: compatible
    evidence:
      - internal/downloader.TestDownloadCompleteAndResume
      - internal/downloader.TestDownloadRestartsWhenServerIgnoresRange
      - internal/downloader.TestDownloadUnknownLength
      - internal/downloader.TestDownloadForwardsSelectedHTTPHeaders
      - internal/downloader.TestDownloadCancellationLeavesPartialState
      - internal/downloader.TestDownloadSafetyAndOverwrite
      - internal/downloader.TestDownloadRejectsSymlinkEscape
      - internal/downloader.TestDownloadRejectsSymlinkPartialFile
      - internal/downloader.TestDownloadRetriesRetryableFailure
      - internal/downloader.TestDownloadRestartsOnChangedETag
    owner: io
    depends_on:
      - network.shared_transport

  - id: compat.output_template_minimal
    name: Minimal output-template subset
    phase: 0
    compatibility_target: Render literals, percent escapes, and simple string field substitutions safely.
    status: compatible
    evidence:
      - internal/compat/template.TestRenderSubset
      - internal/compat/template.TestResolveSanitizesAndConfines
      - internal/compat/template.TestResolveRejectsTraversalAndAbsolutePaths
      - internal/compat/template.TestReservedFilename
      - internal/compat/template.FuzzResolve
    owner: core
    depends_on:
      - metadata.ordered_values

  - id: verification.python_free
    name: Python-free runtime verification
    phase: 0
    compatibility_target: Build, test, and run the binary in an environment without Python executables or libraries.
    status: compatible
    evidence:
      - .github/python-free.Dockerfile
      - .github/workflows/ci.yml#python-free
      - internal/e2e.TestCLIProcessWalkingSkeleton
      - internal/conformance.TestProductionSourcesDoNotInvokePython
    owner: conformance

  - id: operation.structured_events
    name: Structured operation events
    phase: 0
    compatibility_target: Keep progress and lifecycle data independent from terminal rendering and machine output.
    status: compatible
    evidence:
      - internal/events.TestMultiEmitsInOrderAndJoinsErrors
      - internal/cli.TestRunProgressJSONStaysOnStderr
      - pkg/ytdlp.TestClientWalkingSkeleton
    owner: core

  - id: format.selection_minimal
    name: Minimal format selection
    phase: 0
    compatibility_target: Select the first best-first normalized format containing a downloadable URL.
    status: compatible
    evidence:
      - internal/format.TestBestSelectsFirstDownloadableFormat
      - internal/format.TestBestRejectsMissingFormats
      - internal/format.TestBestMergesInfoAndFormatHTTPHeaders
      - internal/format.TestBestRejectsMalformedHTTPHeaders
    owner: core
    depends_on:
      - metadata.ordered_values

  - id: architecture.risk_decisions
    name: High-risk architecture decisions
    phase: 0
    compatibility_target: Record bounded decisions for regex, JavaScript, impersonation, plugins, and ffmpeg.
    status: compatible
    evidence:
      - docs/adr/0001-regex-compatibility.md
      - docs/adr/0002-javascript-runtime.md
      - docs/adr/0003-browser-impersonation.md
      - docs/adr/0004-plugin-architecture.md
      - docs/adr/0005-ffmpeg-boundary.md
    owner: architecture

  - id: protocol.hls
    name: HLS downloading
    phase: 1
    compatibility_target: Download VOD and live HLS variants with yt-dlp-compatible selection and recovery behavior.
    status: compatible
    evidence:
      - internal/fragment.TestEngineDownloadsRangesDecryptsAndAssemblesInOrder
      - internal/fragment.TestEngineReusesCompletedFragments
      - internal/protocol/hls.TestParseMasterAndMedia
      - internal/protocol/hls.TestDownloadMasterByteRangeMapAndAES128
      - internal/protocol/hls.TestDownloadLivePollDeduplicatesSegments
      - internal/protocol/hls.TestDownloadLiveHonorsCancellation
      - internal/protocol/hls.TestDownloadEmptyPlaylistReturnsNoSegments
      - internal/protocol/hls.TestParseBoundsInputAndEntryCount
      - internal/protocol/hls.FuzzParse
      - pkg/ytdlp.TestClientHLSAndDASHDispatch
      - internal/cli.TestRunHLSProtocolDispatch
    owner: io
    known_deviation: Product format dispatch is implemented. Low-latency HLS, SAMPLE-AES, and non-AES-128 encryption remain explicitly unsupported by the Phase 1 pilot.

  - id: protocol.dash
    name: DASH downloading
    phase: 1
    compatibility_target: Download and assemble DASH representations with compatible fragment recovery.
    status: compatible
    evidence:
      - internal/protocol/dash.TestParseBaseInheritanceTemplatesAndSegmentList
      - internal/protocol/dash.TestParseDurationTemplate
      - internal/protocol/dash.TestParseInheritedNegativeRepeatDynamicTimeline
      - internal/protocol/dash.TestParseSegmentBaseSingleFileAndRejectsSIDX
      - internal/protocol/dash.TestDownloadSeparateAudioVideoTracks
      - internal/protocol/dash.TestDownloadDynamicMPDPollsAndDeduplicates
      - internal/protocol/dash.TestDownloadDynamicUsesManifestPollIntervalAndCancels
      - internal/protocol/dash.TestDownloadDynamicDoesNotCollideSameRepresentationID
      - internal/protocol/dash.FuzzParse
      - internal/media/pipeline.TestDASHDownloadAndFFmpegMergeEndToEnd
      - pkg/ytdlp.TestClientHLSAndDASHDispatch
      - pkg/ytdlp.TestClientDASHMergeDispatch
      - conformance/media/dash/PROVENANCE.md
    owner: io
    known_deviation: Product dispatch, inherited addressing, live negative-repeat timelines, and dynamic polling are implemented. SegmentBase indexRange/SIDX expansion and multi-period concatenation remain explicit Phase 1 deviations.

  - id: postprocess.ffmpeg
    name: ffmpeg and ffprobe orchestration
    phase: 1
    compatibility_target: Probe, merge, and remux through supervised shell-free ffmpeg/ffprobe operations.
    status: compatible
    evidence:
      - internal/media/ffmpeg.TestDiscoverVersionsProbeAndMerge
      - internal/media/ffmpeg.TestCommandCancellation
      - internal/media/ffmpeg.TestAtomicPostprocessCancellationRemovesTemporaryOutput
      - internal/media/ffmpeg.TestRemuxCategorizesFailureAndDestinationConflict
      - internal/media/ffmpeg.TestDiagnosticRedaction
      - internal/media/ffmpeg.FuzzRedactDiagnostic
      - internal/media/pipeline.TestDASHDownloadAndFFmpegMergeEndToEnd
      - internal/media/pipeline.TestRemuxDownloadFinalizesThenRemovesSource
      - pkg/ytdlp.TestClientDASHMergeDispatch
      - docs/P1_MEDIA_COMPLETION.md
    owner: media
    known_deviation: The Phase 1 operation set covers probe, separate-track merge, and atomic container remux. Codec transcoding, subtitle/thumbnail embedding, and metadata rewriting remain broader postprocessor work.

  - id: javascript.ejs
    name: Python-free EJS execution
    phase: 1
    compatibility_target: Execute supported extractor JavaScript with bounded resources and no Python runtime.
    status: compatible
    evidence:
      - docs/JAVASCRIPT_HELPER_PROTOCOL.md
      - internal/javascript/protocol.TestRequestNormalizeDefaultsAndHash
      - internal/javascript/protocol.TestRequestRejectsLimitsHashesModulesAndArguments
      - internal/javascript/protocol.TestFrameRoundTripAndBounds
      - internal/javascript/engine.TestExecuteEvaluateAndCall
      - internal/javascript/engine.TestExecuteCachesProgramsWithoutSharingRuntimeState
      - internal/javascript/engine.TestExecuteTimeoutCancellationAndFailures
      - internal/javascript/engine.TestExecuteOutputLimitAndNoAmbientHostAPIs
      - internal/javascript/supervisor.TestSupervisorExecutesAndRetainsCompiledCache
      - internal/javascript/supervisor.TestSupervisorCancellationDiscardsAndRestartsHelper
      - internal/javascript/supervisor.TestSupervisorCategorizesCrashAndMalformedResponse
      - internal/javascript/ejs.TestPinnedEJSCorpus
      - internal/javascript/ejs.TestVerifyAssetsAndInputBounds
      - conformance/javascript/ejs-0.8.0/PROVENANCE.md
      - .github/python-free.Dockerfile
    owner: runtime
    known_deviation: Compatibility is scoped to the pinned Phase 1 EJS corpus; live player-variant breadth and component updates remain extractor and upstream-delta work.

  - id: network.impersonation
    name: Browser impersonation transport
    phase: 1
    compatibility_target: Execute a selected protected flow with a versioned browser network profile.
    status: compatible
    evidence:
      - internal/network.TestImpersonatedProtectedFlowAndSharedCookies
      - internal/network.TestImpersonationRejectsUnknownProfileWithoutFallback
      - internal/network.TestImpersonationProfileDiagnostics
      - internal/network.TestImpersonationUsesProxyAndRedactsFailures
      - internal/network/impersonate.TestProfileMetadataAndCopiesAreStable
      - internal/network/impersonate.TestRequestAdapterPreservesSemanticsAndAppliesProfile
      - internal/network/impersonate.TestCookieJarAdapterRoundTripsAllSupportedFields
      - cmd/impersonationcheck.TestSummarizeExtractsBoundedFingerprintEvidence
      - conformance/network/impersonation/PROVENANCE.md
      - conformance/network/impersonation/LIVE_CANARY.md
    owner: io
    depends_on:
      - network.shared_transport
    known_deviation: Compatibility is scoped to the versioned Chrome 133 TLS/HTTP2 pilot profile; HTTP/3 and newer browser profiles remain later profile updates.

  - id: cookies.browser_import
    name: Browser-cookie import
    phase: 1
    compatibility_target: Import cookies from one Chromium-family browser without Python.
    status: compatible
    evidence:
      - internal/cookies/chromium.TestDeriveMacKeyMatchesPinnedReference
      - internal/cookies/chromium.TestMacDecryptorPinnedCorpus
      - internal/cookies/chromium.TestMacDecryptorRejectsWrongHostPaddingAndKey
      - internal/cookies/chromium.FuzzMacDecryptor
      - internal/cookies/chromium.TestImportCopiesLiveWALAndReturnsPartialResults
      - internal/cookies/chromium.TestImportSupportsOlderSecureSchema
      - internal/cookies/chromium.TestImportReportsUnavailableKeyWithoutDiscardingPlaintext
      - internal/cookies/chromium.TestImportRejectsUnsafePathsAndCancellation
      - internal/network.TestAddCookiesPreservesHostScopeAndSecurity
      - pkg/ytdlp.TestClientImportsBrowserCookiesBeforeExtraction
      - conformance/cookies/chromium-macos/PROVENANCE.md
    owner: authentication
    depends_on:
      - network.shared_transport
    known_deviation: Compatibility is scoped to Google Chrome v10 cookie encryption on macOS. Other Chromium brands and Windows/Linux credential stores remain later profiles.

  - id: extractor.youtube_pilot
    name: YouTube pilot extraction
    phase: 1
    compatibility_target: Prove metadata, formats, playlists, and challenge execution for a pinned YouTube corpus.
    status: compatible
    evidence:
      - internal/extractor.TestYouTubeSuitableAndVideoID
      - internal/extractor.TestYouTubeExtractsPinnedVideoAndSolvesChallenges
      - internal/extractor.TestYouTubeChallengeAndAvailabilityFailuresAreCategorized
      - internal/extractor.TestYouTubeCanonicalizesShortURLsBeforeFetching
      - internal/extractor.TestYouTubeRejectsMalformedPlayerResponse
      - internal/extractor.TestYouTubePlaylistIsLazyPagedAndMatchesPinnedShape
      - internal/extractor.TestYouTubePlaylistFailuresAreCategorized
      - internal/extractor.TestYouTubeExtractsLiveHLSAndClassifiesLiveStates
      - internal/extractor.TestRequestJSONBoundsStatusAndSyntax
      - internal/extractor.FuzzParseYouTubePlaylistData
      - conformance/extractors/youtube/PROVENANCE.md
    owner: extractors
    depends_on:
      - javascript.ejs
      - extractor.playlists
    known_deviation: Compatibility is scoped to the pinned Phase 1 video, playlist-continuation, and live-HLS corpus. Authenticated clients, subtitles, comments, channel/tab variants, live-from-start, and broader player/renderer variants remain pending.

  - id: extractor.playlists
    name: Playlist extraction model
    phase: 1
    compatibility_target: Preserve ordered, lazy, and nested playlist semantics required by pilot extractors.
    status: compatible
    evidence:
      - internal/extractor.TestEntryObjectMatchesURLResultShape
      - internal/extractor.TestOnDemandEntriesAreOrderedLazyAndReusable
      - internal/extractor.TestEntrySequencesPropagateCancellationErrorsAndLimits
      - internal/extractor.TestContinuationEntriesFollowEmptyPagesAndStopLoops
      - internal/extractor.TestPlaylistMarksMetadataWithoutMaterializingEntries
      - internal/extractor.TestRegistryHonorsExplicitExtractorKey
      - internal/extractor.FuzzOnDemandEntries
      - pkg/ytdlp.TestOperationResolvesNestedPlaylistInOrder
      - pkg/ytdlp.TestOperationDownloadsPlaylistAndAggregatesBytes
      - pkg/ytdlp.TestOperationRejectsNestedPlaylistCycle
      - pkg/ytdlp.TestOperationMergesTransparentEntryMetadata
      - docs/PLAYLIST_MODEL.md
    owner: extractors
    known_deviation: The Phase 1 model resolves entries sequentially with a fail-fast error policy and supports id/title overlays for transparent URL results. Playlist slicing, random/reverse ordering, arbitrary transparent fields, and configurable ignore-error policy remain broader compatibility work.

  - id: extractor.live
    name: Live extraction pilot
    phase: 1
    compatibility_target: Extract and download one representative live platform without Python.
    status: compatible
    evidence:
      - internal/extractor.TestYouTubeExtractsLiveHLSAndClassifiesLiveStates
      - internal/protocol/hls.TestDownloadLivePollDeduplicatesSegments
      - internal/protocol/hls.TestDownloadLiveHonorsCancellation
      - internal/extractor.TestTwitchExtractAndDownloadLiveHLS
      - internal/extractor.TestTwitchCategorizesFailures
      - conformance/extractors/youtube/PROVENANCE.md
      - conformance/extractors/twitch/PROVENANCE.md
    owner: extractors
    depends_on:
      - protocol.hls
    known_deviation: The compatible pilot includes Twitch extraction through signed HLS discovery, live polling, end-of-stream, de-duplication, and ordered assembly. Live-from-start VOD fallback, subscriber entitlements, chat, and broader Twitch URL types remain later coverage.

  - id: extractor.twitch_pilot
    name: Twitch live extraction pilot
    phase: 1
    compatibility_target: Extract and download a Twitch stream through GraphQL metadata, playback authorization, and signed live HLS without Python.
    status: compatible
    evidence:
      - internal/extractor.TestTwitchSuitable
      - internal/extractor.TestTwitchExtractAndDownloadLiveHLS
      - internal/extractor.TestTwitchRerunLiveStateAndMissingOptionalFields
      - internal/extractor.TestTwitchManifestURLIncludesReferenceParameters
      - internal/extractor.TestTwitchCategorizesFailures
      - internal/extractor.TestTwitchErrorsDoNotExposeResponseSecrets
      - internal/extractor.TestTwitchExtractHonorsCancellation
      - internal/extractor.FuzzTwitchMetadataResponse
      - conformance/extractors/twitch/PROVENANCE.md
    owner: extractors
    depends_on:
      - protocol.hls
      - network.shared_transport
    known_deviation: Compatibility is scoped to the pinned public stream corpus. VODs, clips, channel playlists, live-from-start, chat/subtitles, OAuth cookie translation, and subscriber-only entitlement diagnostics remain broader Twitch work.

  - id: extractor.soundcloud_pilot
    name: SoundCloud API and playlist pilot
    phase: 1
    compatibility_target: Extract SoundCloud tracks, sets, and lazy user-track pages through bounded public API discovery without Python.
    status: compatible
    evidence:
      - internal/extractor.TestSoundCloudSuitableGuards
      - internal/extractor.TestSoundCloudTrackMetadataAndTranscodingResolution
      - internal/extractor.TestSoundCloudUserTrackPagesAreLazyOrderedAndReusable
      - internal/extractor.TestSoundCloudSetEntriesRemainOrderedTransparentURLs
      - internal/extractor.TestSoundCloudCancellationInterruptsLazyPage
      - internal/extractor.TestSoundCloudCategorizedFailuresAndSecretRedaction
      - internal/extractor.TestSoundCloudRejectsUntrustedContinuationAndAsset
      - internal/extractor.FuzzSoundCloudURLClassification
      - internal/extractor.FuzzSoundCloudPageEntries
      - pkg/ytdlp.TestProductRegistryIncludesPhaseOneExtractors
      - conformance/extractors/soundcloud/PROVENANCE.md
      - docs/P1_SOUNDCLOUD_EVIDENCE.md
    owner: extractors
    depends_on:
      - extractor.playlists
      - protocol.hls
      - network.shared_transport
    known_deviation: Compatibility is scoped to the pinned public track, static-set, and lazy user-tracks corpus. OAuth/private media, premium originals, search, comments, stations, related media, non-track profile tabs, and private-set batch hydration remain broader SoundCloud work.

  - id: extractor.vimeo_pilot
    name: Vimeo manifest-heavy extraction pilot
    phase: 1
    compatibility_target: Extract Vimeo progressive, HLS, and DASH formats through the protected webpage flow without Python.
    status: compatible
    evidence:
      - internal/extractor.TestVimeoExtractsProgressiveHLSAndDASHWithProfile
      - internal/extractor.TestVimeoSuitableAndPlayerConfig
      - internal/extractor.TestVimeoFailuresAreCategorized
      - internal/extractor.FuzzParseVimeoConfig
      - conformance/extractors/vimeo/PROVENANCE.md
    owner: extractors
    depends_on:
      - network.impersonation
      - protocol.hls
      - protocol.dash
    known_deviation: Compatibility is scoped to the pinned public-video/player-config corpus. Password submission, showcases/channels, unlisted hashes, DRM, subtitles, and live archive variants remain broader Vimeo work.

  - id: extractor.tiktok_pilot
    name: TikTok impersonation and anti-bot pilot
    phase: 1
    compatibility_target: Extract a public TikTok video from bounded hydration state through an explicit browser profile with no native fallback.
    status: compatible
    evidence:
      - internal/extractor.TestTikTokExtractsProtectedHydrationFormats
      - internal/extractor.TestTikTokSuitableAndEmbedCanonicalization
      - internal/extractor.TestTikTokFailuresAreCategorizedAndSecretSafe
      - internal/extractor.TestTikTokCancellationAndHydrationBound
      - internal/extractor.FuzzParseTikTokPage
      - conformance/extractors/tiktok/PROVENANCE.md
      - docs/P1_TIKTOK_PILOT.md
    owner: extractors
    depends_on:
      - network.impersonation
      - network.shared_transport
    known_deviation: Compatibility is scoped to the pinned public hydration corpus. Mobile API signing/device rotation, WAF proof-of-work, SIGI fallback, captions, image slideshows, and broader availability labels remain explicit anti-bot work.

  - id: extractor.authenticated_pilot
    name: Deterministic authenticated extractor pilot
    phase: 1
    compatibility_target: Prove scoped operation-jar authentication and secret-safe extraction through a deterministic protected API.
    status: compatible
    evidence:
      - internal/extractor.TestSyntheticAuthSuitable
      - internal/extractor.TestSyntheticAuthUsesScopedOperationJarAndDropsSecret
      - internal/extractor.TestSyntheticAuthCategorizesAuthenticationAndAvailability
      - internal/extractor.TestSyntheticAuthErrorsDoNotExposeCookieOrResponse
      - internal/extractor.TestSyntheticAuthHonorsCancellation
      - internal/extractor.FuzzSyntheticAuthResponse
      - conformance/extractors/synthetic-auth/PROVENANCE.md
      - docs/P1_AUTH_REGION_EXTRACTORS.md
    owner: authentication
    depends_on:
      - network.shared_transport
      - cookies.browser_import
    known_deviation: The gate uses a reserved synthetic origin to prove the shared cookie/authentication boundary. It intentionally does not model a third-party login flow, credential submission, or refresh-token lifecycle.

  - id: extractor.region_svt_pilot
    name: SVT Play regional extraction pilot
    phase: 1
    compatibility_target: Extract localized SVT Play single-video metadata and distinguish Sweden-only availability without Python.
    status: compatible
    evidence:
      - internal/extractor.TestRegionSVTSuitable
      - internal/extractor.TestRegionSVTExtractExplicitID
      - internal/extractor.TestRegionSVTDiscoversIDFromPage
      - internal/extractor.TestRegionSVTLiveUsesLiveHLSProtocol
      - internal/extractor.TestRegionSVTCategorizesFailures
      - internal/extractor.TestRegionSVTHonorsCancellation
      - internal/extractor.FuzzRegionSVTVideoResponse
      - conformance/extractors/region-svt/PROVENANCE.md
      - docs/P1_AUTH_REGION_EXTRACTORS.md
    owner: extractors
    depends_on:
      - protocol.hls
      - protocol.dash
    known_deviation: Compatibility is scoped to the pinned SVT single-video corpus. Series/page playlists, full URQL transformation, HDS, manifest pre-expansion, and geo-bypass header synthesis remain broader regional work.

  - id: compat.configuration
    name: Configuration compatibility
    phase: 2
    compatibility_target: Discover and merge supported yt-dlp configuration files with compatible precedence.
    status: not_started
    owner: core

  - id: cache.namespaced_storage
    name: Bounded namespaced cache
    phase: 2
    compatibility_target: Store, expire, retrieve, and safely remove bounded namespaced compatibility data with atomic filesystem behavior.
    status: not_started
    owner: core

  - id: cookies.portable_sources
    name: Portable cookie sources
    phase: 2
    compatibility_target: Read Netscape cookie files and import declared Firefox and Chromium profiles across the supported platform matrix without exposing secrets.
    status: compatible
    evidence:
      - internal/cookies/netscape.TestParseSemanticsAndRoundTrip
      - internal/cookies/netscape.TestParsePartialMalformedAndSecretRedaction
      - internal/cookies/netscape.TestParseCancellation
      - internal/cookies/netscape.FuzzParse
      - internal/cookies/firefox.TestImportSchema16ExpiryFlagsAndContainer
      - internal/cookies/firefox.TestImportCopiesLockedLiveWAL
      - internal/cookies/firefox.TestLocateNewestSyntheticProfile
      - internal/cookies/firefox.TestImportCancellationAndUnsafePath
      - internal/cookies/firefox.FuzzValidCookie
      - internal/cookies/chromiumlinux.TestPinnedLinuxV10Corpus
      - internal/cookies/chromiumlinux.TestPinnedLinuxV11Corpus
      - internal/cookies/chromiumlinux.TestImportPlainV10V11AndSchema
      - internal/cookies/chromiumlinux.TestImportCredentialFailureIsPartialAndRedacted
      - internal/cookies/chromiumlinux.TestImportZeroesProviderPassword
      - internal/cookies/chromiumlinux.FuzzDecrypt
      - pkg/ytdlp.TestClientLoadsNetscapeCookieFileBeforeExtraction
      - pkg/ytdlp.TestPortableBrowserCookieDispatch
      - conformance/cookies/netscape/PROVENANCE.md
      - conformance/cookies/firefox/PROVENANCE.md
      - conformance/cookies/chromium-linux/PROVENANCE.md
    owner: authentication
    known_deviation: Firefox profile aliases from profiles.ini are not resolved; explicit profile/database paths remain available. Linux Chromium v11 decryption requires an injected Secret Service or KWallet password provider, and Windows Chromium/DPAPI remains pending. No automated test reads a real profile.

  - id: compat.languages_principal
    name: Principal compatibility languages
    phase: 2
    compatibility_target: Evaluate the declared principal format, sorting, output, progress, metadata, and match-filter language corpus with bounded exact diagnostics.
    status: not_started
    owner: core

  - id: downloader.protocol_matrix
    name: Alpha downloader and protocol matrix
    phase: 2
