      TestSingleflightAllWaitersCancelCancelsPreprocessing,
      TestSingleflightCanceledLeaderNoFollowersReturnsPromptly,
      TestFlightOwnershipAbandonedDoesNotDeleteReplacement,
      TestSupervisorConcurrentExecuteAndCloseDrainsActiveSolves.
      Live validation: pending (requires service conditions permitting
      protected-video extraction). Remaining deviation: no sanitized
      real 1-2 MB player fixture committed (proprietary); the generated
      ~150 KB workload exercises the parse path but does not empirically
      reproduce the original 30 s timeout; the fix is proven structurally
      via protocol validation gating.

