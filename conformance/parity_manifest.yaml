    owner: core
    depends_on:
      - extractor.direct_media
      - extractor.phase2_breadth
      - extractor.playlists
    known_deviation: Discovery is limited to explicit embed-bearing HTML attributes, the documented native-provider URL allowlist (including embedUrl-only JSON-LD), JSON-LD VideoObject/AudioObject contentUrl with the documented core metadata, machine-date, interaction, and chapter fields, Twitter player streams, and exact OpenGraph video/audio properties. Multiple metadata URLs from one source become formats of one page item. Arbitrary script/player configuration, locale-dependent human JSON-LD dates, arbitrary iframe crawling, and unsupported providers remain explicit gaps.

