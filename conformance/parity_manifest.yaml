    known_deviation: Product dispatch, inherited addressing, live negative-repeat timelines, dynamic polling, bounded SegmentBase indexRange/SIDX expansion, and compatible contiguous static fragmented multi-period composition are implemented. Multi-period timing must be derivable and gap-free, and the segment budget applies across the complete selected track. Dynamic SegmentBase/SIDX, hierarchical SIDX references, and dynamic, unfragmented, timing-ambiguous, or format-incompatible multi-period composition remain unsupported; initialization/media overlap is rejected rather than trimmed, and index retrieval is single-attempt while media fragments use normal retry policy.

