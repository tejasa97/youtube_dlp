version: 1
capabilities:
  - id: foundation.cli
    name: Foundation CLI boundary
    phase: 0
    compatibility_target: Run the Phase 0 fixture/direct-HTTP workflow with stable help, output separation, and categorized exits.
    status: compatible
    evidence:
      - internal/cli.TestRunVersion
      - internal/cli.TestRunRequiresURL
      - internal/cli.TestRunWalkingSkeletonAndJSONSeparation
      - internal/cli.TestRunResumesPartialDownload
      - internal/cli.TestRunCancellationExitCode
      - internal/e2e.TestCLIProcessWalkingSkeleton
    owner: core

  - id: cli.simulation
    name: Tri-state simulation mode
    phase: 3
    compatibility_target: Keep simulation distinct from media-only skip behavior and let explicit positive or negative choices override listing defaults.
    status: compatible
    evidence:
      - internal/cli.TestRunSimulationTriStateAndSkipDownloadRemainDistinct
      - internal/cli.TestRunListSubsNoSimulateDownloadsAndHonorsSubtitleWrites
      - internal/cli.TestRunCommandLineNoSimulateOverridesInheritedSimulation
      - pkg/ytdlp.TestClientSimulationSuppressesEveryOutputArtifact
      - docs/YOUTUBE_SUBTITLE_LISTING_EVIDENCE.md
    owner: core
    depends_on:
      - foundation.cli

  - id: cli.json_dump
    name: Per-video and whole-result JSON dumps
    phase: 3
    compatibility_target: Provide quiet, simulation-aware per-video and whole-URL JSON modes with deterministic playlist ordering.
    status: compatible
    evidence:
      - internal/cli.TestRunDumpJSONModesSimulateQuietlyAndNoSimulateDownloads
      - internal/cli.TestRunDumpJSONSimulationSuppressesRelatedFiles
      - internal/cli.TestRunDumpJSONExplicitNoQuietAndCombinedModes
      - internal/cli.TestRunDumpJSONFromConfigurationHonorsCommandLineNoSimulate
      - internal/cli.TestWriteVideoJSONLinesFlattensPlaylistsAndHandlesFailures
      - internal/cli.FuzzWriteJSONLine
      - internal/cli.TestRunTelemetryJSONSuccessFailureAndConflict
      - docs/CLI_JSON_OUTPUT_EVIDENCE.md
    owner: core
    depends_on:
      - cli.simulation
      - metadata.deterministic_json
      - extractor.playlists
    known_deviation: Per-video lines are emitted in deterministic order after the complete product operation returns rather than streaming between playlist entries. The pre-existing hidden --print-json compatibility mode remains whole-result and non-simulating; public dump modes take precedence when combined with it.

  - id: cli.metadata_sidecars
    name: Metadata, description, and internet-shortcut sidecars
    phase: 3
    compatibility_target: Write confined video and playlist metadata files and safe platform shortcut formats without Python or a media download.
    status: compatible
    evidence:
      - pkg/ytdlp.TestWriteRelatedFilesAllKindsAndExistingPolicy
      - pkg/ytdlp.TestWriteRelatedFilesPlaylistScopeUnsafeLinksAndCancellation
      - pkg/ytdlp.TestWriteAtomicRelatedFileRejectsSymlink
      - pkg/ytdlp.TestPrepareRelatedDestinationRejectsNestedSymlink
      - pkg/ytdlp.TestSafeLinkURLConvertsIRIHostAndEscapesPath
      - pkg/ytdlp.TestOperationWritesFinalPlaylistAndEntryMetadataSidecars
      - pkg/ytdlp.FuzzSafeLinkURL
      - internal/cli.TestRunWritesMetadataAndShortcutSidecarsWithoutMedia
      - internal/cli.TestRunDumpJSONSimulationSuppressesRelatedFiles
      - conformance/related_files/PROVENANCE.md
      - docs/METADATA_SIDECARS_EVIDENCE.md
    owner: core
    depends_on:
      - cli.simulation
      - compat.output_template_minimal
      - metadata.deterministic_json
    known_deviation: Related files use the port's deterministic normalized metadata schema and one shared output template. Per-type output templates, thumbnail and annotation sidecars, and non-atomic Windows replacement where the platform cannot provide it remain outside this claim.

