title = "ytdlp-go Gitleaks configuration"

[extend]
useDefault = true

[[allowlists]]
description = "Synthetic Chromium password vector documented in fixture provenance"
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "line"
paths = ['''^conformance/cookies/chromium-macos/corpus\.json$''']
regexes = ['''"password": "6eIDUdtKAacvlHwBVwvg/Q=="''']

[[allowlists]]
description = "Synthetic Windows Chromium AES key documented in fixture provenance"
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "line"
paths = ['''^conformance/cookies/chromium-windows/vectors\.json$''']
regexes = ['''"master_key_base64": "MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY="''']

[[allowlists]]
description = "Gitleaks decoded form of the same synthetic Windows Chromium AES key"
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "line"
paths = ['''^conformance/cookies/chromium-windows/vectors\.json$''']
regexes = ['''"master_key_base64": "0123456789abcdef0123456789abcdef"''']

[[allowlists]]
description = "ARD API route constant, not a credential"
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "line"
paths = ['''^internal/extractor/ard\.go$''']
regexes = ['''apiPath := "widgets/ard/asset/"''']

[[allowlists]]
description = "ARD compilation API route constant, not a credential"
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "line"
paths = ['''^internal/extractor/ard\.go$''']
regexes = ['''apiPath = "compilations/ard/"''']

[[allowlists]]
description = "NRK public service hostname list, not a credential"
targetRules = ["generic-api-key"]
condition = "AND"
regexTarget = "line"
paths = ['''^internal/extractor/nrk\.go$''']
regexes = ['''"v8\.psapi\.nrk\.no", "v8-psapi\.nrk\.no"''']

[[allowlists]]
description = "Public Twitch web client ID also used by the pinned behavioral reference"
targetRules = ["twitch-api-token"]
condition = "AND"
regexTarget = "line"
paths = ['''^internal/extractor/twitch\.go$''']
regexes = ['''twitchClientID\s*=\s*"ue6666qo983tsx6so1t0vnawi233wa"''']
